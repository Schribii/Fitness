<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wald Coach Pro</title>
    <style>
        :root {
            --forest-green: #2e7d32;
            --summer-orange: #ff9800;
            --power-red: #d32f2f;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e8f5e9;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 500px;
            background: white;
            margin: 20px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        #visual-coach {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            background: #f9f9f9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 5px solid var(--forest-green);
        }
        .timer-display {
            font-size: 48px;
            font-weight: bold;
            color: #333;
            margin: 10px 0;
        }
        .status-text {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--forest-green);
            min-height: 3em;
        }
        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        .btn-start { background: var(--forest-green); color: white; }
        .btn-stop { background: var(--power-red); color: white; display: none; }
        
        /* Animation für Übungen */
        @keyframes workout-move {
            0% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0); }
        }
        .animate-exercise { animation: workout-move 2s infinite ease-in-out; }
    </style>
</head>
<body>

<div class="container" id="main-ui">
    <h1 id="title">🌲 Wald Coach Pro</h1>
    
    <div id="visual-coach">
        <svg id="coach-svg" width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="5" r="3"></circle>
            <path d="M12 8v8"></path>
            <path d="M7 11h10"></path>
            <path d="M9 22l3-6 3 6"></path>
        </svg>
    </div>

    <div class="status-text" id="status">Wähle dein Training</div>
    <div class="timer-display" id="timer">00:00</div>

    <div id="menu">
        <button class="btn-start" onclick="startWorkout(1)">💪 Arme & Oberkörper</button>
        <button class="btn-start" onclick="startWorkout(2)">🧘 Rumpf & Rücken</button>
        <button class="btn-start" onclick="startWorkout(3)">🏃 Beine & Balance</button>
    </div>
    
    <button class="btn-stop" id="stop-btn" onclick="stopWorkout()">🛑 Training abbrechen</button>
</div>

<audio id="music-summer" loop src="https://cdn.pixabay.com/audio/2022/05/27/audio_106651f496.mp3"></audio> <audio id="music-power" loop src="https://cdn.pixabay.com/audio/2021/11/23/audio_7809633e21.mp3"></audio> <script>
    let synth = window.speechSynthesis;
    let workoutActive = false;
    let timerInterval;
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const icons = {
        run: `<path d="M13 4v16M17 4v16M9 4v16M5 4v16" stroke="#ff9800"/>`, // Symbolisch für Bewegung
        exercise: `<circle cx="12" cy="5" r="3"/><path d="M12 8v8M7 11h10M9 22l3-6 3 6" stroke="#2e7d32"/>`
    };

    const workouts = {
        1: [
            { type: 'run', text: "Locker einlaufen. 5 Minuten.", duration: 300 },
            { type: 'ex', text: "Baum-Liegestütze. 12 Mal.", duration: 40 },
            { type: 'run', text: "Pause. Laufe 3 Minuten weiter.", duration: 180 },
            { type: 'ex', text: "Isometrisches Drücken. Hände zusammen pressen.", duration: 30 }
        ],
        2: [
            { type: 'run', text: "Warm up. 5 Minuten.", duration: 300 },
            { type: 'ex', text: "Die Windmühle. Rumpf beugen.", duration: 60 }
        ],
        3: [
            { type: 'run', text: "Lauf los. 5 Minuten.", duration: 300 },
            { type: 'ex', text: "Wald-Kniebeugen. Rücken gerade.", duration: 45 }
        ]
    };

    function beep(freq, duration) {
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.value = 0.1;
        osc.start();
        setTimeout(() => osc.stop(), duration);
    }

    function speak(text) {
        return new Promise((resolve) => {
            if (!workoutActive) return;
            let utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'de-DE';
            utterance.onend = resolve;
            synth.speak(utterance);
        });
    }

    function updateUI(type, text) {
        const svg = document.getElementById('coach-svg');
        const status = document.getElementById('status');
        const visual = document.getElementById('visual-coach');
        
        status.innerText = text;
        if (type === 'run') {
            svg.innerHTML = icons.run;
            visual.classList.remove('animate-exercise');
            visual.style.borderColor = 'var(--summer-orange)';
            document.getElementById('music-power').pause();
            document.getElementById('music-summer').play();
        } else {
            svg.innerHTML = icons.exercise;
            visual.classList.add('animate-exercise');
            visual.style.borderColor = 'var(--forest-green)';
            document.getElementById('music-summer').pause();
            document.getElementById('music-power').play();
        }
    }

    async function startTimer(seconds, type) {
        return new Promise((resolve) => {
            let counter = seconds;
            timerInterval = setInterval(() => {
                if (!workoutActive) { clearInterval(timerInterval); return; }
                
                counter--;
                let mins = Math.floor(counter / 60);
                let secs = counter % 60;
                document.getElementById('timer').innerText = `${mins}:${secs.toString().padStart(2, '0')}`;

                // Minute Ansagen während dem Laufen
                if (type === 'run' && counter > 0 && counter % 60 === 0) {
                    speak(`Noch ${counter / 60} Minuten laufen.`);
                }

                // Countdown Beeps
                if (counter <= 30 && counter > 5 && counter % 5 === 0) {
                    beep(440, 100); // Tiefer Beep alle 5 Sek
                }
                if (counter <= 5 && counter > 0) {
                    beep(880, 100); // Hoher Beep jede Sekunde
                }

                if (counter <= 0) {
                    clearInterval(timerInterval);
                    resolve();
                }
            }, 1000);
        });
    }

    async function startWorkout(id) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        workoutActive = true;
        document.getElementById('menu').style.display = 'none';
        document.getElementById('stop-btn').style.display = 'block';
        
        for (let step of workouts[id]) {
            if (!workoutActive) break;
            updateUI(step.type, "Höre auf die Anweisung...");
            await speak(step.text);
            updateUI(step.type, step.text);
            await startTimer(step.duration, step.type);
        }
        
        if (workoutActive) {
            speak("Training beendet. Gute Arbeit!");
            stopWorkout();
        }
    }

    function stopWorkout() {
        workoutActive = false;
        clearInterval(timerInterval);
        synth.cancel();
        document.getElementById('music-summer').pause();
        document.getElementById('music-power').pause();
        document.getElementById('menu').style.display = 'block';
        document.getElementById('stop-btn').style.display = 'none';
        document.getElementById('status').innerText = "Wähle dein Training";
    }
</script>
</body>
</html>
