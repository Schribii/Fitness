<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wald Coach Pro</title>
    <style>
        :root {
            --forest-green: #2e7d32;
            --summer-orange: #ff9800;
            --power-red: #d32f2f;
            --nav-blue: #37474f;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e8f5e9;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }
        .container {
            width: 90%;
            max-width: 500px;
            background: white;
            margin: 20px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        #visual-coach {
            width: 180px;
            height: 180px;
            margin: 20px auto;
            background: #f9f9f9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 5px solid var(--forest-green);
        }
        .timer-display {
            font-size: 48px;
            font-weight: bold;
            color: #333;
            margin: 10px 0;
        }
        .status-text {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--forest-green);
            min-height: 3em;
            padding: 0 10px;
        }
        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:active { transform: scale(0.98); }
        .btn-start { background: var(--forest-green); color: white; }
        .btn-stop { background: var(--power-red); color: white; display: none; }
        
        .nav-container {
            display: none;
            justify-content: space-between;
            gap: 10px;
            margin-top: 15px;
        }
        .btn-nav {
            background: var(--nav-blue);
            color: white;
            font-size: 15px;
            padding: 12px;
            flex: 1;
        }
        .btn-nav.holding {
            background: #cfd8dc;
            color: #37474f;
            transform: scale(0.95);
        }
        
        @keyframes workout-move {
            0% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0); }
        }
        .animate-exercise { animation: workout-move 2s infinite ease-in-out; }
    </style>
</head>
<body>

<div class="container" id="main-ui">
    <h1 id="title">🌲 Wald Coach Pro</h1>
    
    <div id="visual-coach">
        <svg id="coach-svg" width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="5" r="3"></circle>
            <path d="M12 8v8"></path>
            <path d="M7 11h10"></path>
            <path d="M9 22l3-6 3 6"></path>
        </svg>
    </div>

    <div class="status-text" id="status">Wähle dein Training</div>
    <div class="timer-display" id="timer">00:00</div>

    <div id="menu">
        <button class="btn-start" onclick="startWorkout(1)">💪 Arme & Oberkörper</button>
        <button class="btn-start" onclick="startWorkout(2)">🧘 Rumpf & Rücken</button>
        <button class="btn-start" onclick="startWorkout(3)">🏃 Beine & Balance</button>
    </div>
    
    <div class="nav-container" id="nav-controls">
        <button id="btn-prev" class="btn-nav">⬅️ Zurück (2s)</button>
        <button id="btn-next" class="btn-nav">➡️ Weiter (2s)</button>
    </div>

    <button class="btn-stop" id="stop-btn" onclick="stopWorkout()">🛑 Training abbrechen</button>
</div>

<audio id="music-summer" loop preload="auto" src="https://files.freemusicarchive.org/music/pop/The_Hobby_Beat/Dinosaur_Park/The_Hobby_Beat_-_01_-_Breathe.mp3"></audio>
<audio id="music-power" loop preload="auto" src="https://files.freemusicarchive.org/music/disco/Funk_Industrial/The_Future_Is_Disco/Funk_Industrial_-_02_-_Funk_Funk.mp3"></audio>

<script>
    let synth = window.speechSynthesis;
    let workoutActive = false;
    let timerInterval;
    let audioCtx = null;
    
    let currentStepIndex = 0;
    let steps = [];
    let skipHappened = false;
    let timerResolve = null;
    let speakResolve = null;

    const icons = {
        run: `<path d="M13 4v16M17 4v16M9 4v16M5 4v16" stroke="#ff9800"/>`,
        exercise: `<circle cx="12" cy="5" r="3"/><path d="M12 8v8M7 11h10M9 22l3-6 3 6" stroke="#2e7d32"/>`
    };

    const workouts = {
        1: [
            { type: 'run', text: "Locker einlaufen. 5 Minuten.", duration: 300 },
            { type: 'ex', text: "Baum-Liegestütze. 12 Wiederholungen am Stamm.", duration: 40 },
            { type: 'run', text: "Pause. Laufe 3 Minuten weiter.", duration: 180 },
            { type: 'ex', text: "Isometrisches Drücken. Handflächen fest zusammenpressen.", duration: 30 },
            { type: 'run', text: "Laufe wieder 3 Minuten locker weiter.", duration: 180 },
            { type: 'ex', text: "Armkreisen mit Power. Arme auf Schulterhöhe ausstrecken.", duration: 40 }
        ],
        2: [
            { type: 'run', text: "Warm up. 5 Minuten locker laufen.", duration: 300 },
            { type: 'ex', text: "Die Windmühle. Rumpfbeugen im Stehen.", duration: 60 },
            { type: 'run', text: "3 Minuten lockere Laufpause.", duration: 180 },
            { type: 'ex', text: "Stehender Käfer. Ellenbogen zum Knie ziehen.", duration: 45 }
        ],
        3: [
            { type: 'run', text: "Lauf entspannt los. 5 Minuten.", duration: 300 },
            { type: 'ex', text: "Wald-Kniebeugen. Tief gehen, Rücken gerade.", duration: 45 },
            { type: 'run', text: "3 Minuten weiterlaufen.", duration: 180 },
            { type: 'ex', text: "Ausfallschritte auf der Stelle.", duration: 45 }
        ]
    };

    function beep(freq, duration) {
        if(!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.value = 0.05;
        osc.start();
        setTimeout(() => osc.stop(), duration);
    }

    function speak(text) {
        return new Promise((resolve) => {
            if (!workoutActive) { resolve(); return; }
            speakResolve = resolve;
            let utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'de-DE';
            
            const finish = () => {
                if (speakResolve) {
                    speakResolve = null;
                    resolve();
                }
            };
            utterance.onend = finish;
            utterance.onerror = finish;
            synth.speak(utterance);
        });
    }

    function updateUI(type, text) {
        const svg = document.getElementById('coach-svg');
        const status = document.getElementById('status');
        const visual = document.getElementById('visual-coach');
        
        const summerMusic = document.getElementById('music-summer');
        const powerMusic = document.getElementById('music-power');

        status.innerText = text;
        
        if (type === 'run') {
            svg.innerHTML = icons.run;
            visual.classList.remove('animate-exercise');
            visual.style.borderColor = 'var(--summer-orange)';
            
            // Lighter and quieter music during running
            powerMusic.volume = 0;
            summerMusic.volume = 0.08; // Decreased from 0.15
        } else {
            svg.innerHTML = icons.exercise;
            visual.classList.add('animate-exercise');
            visual.style.borderColor = 'var(--forest-green)';
            
            // Pop/Disco music for exercises
            summerMusic.volume = 0;
            powerMusic.volume = 0.15; // Decreased from 0.2
        }
    }

    function startTimer(seconds, type) {
        return new Promise((resolve) => {
            timerResolve = resolve;
            let counter = seconds;
            
            let mins = Math.floor(counter / 60);
            let secs = counter % 60;
            document.getElementById('timer').innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
            
            timerInterval = setInterval(() => {
                if (!workoutActive) {
                    clearInterval(timerInterval);
                    if (timerResolve) { timerResolve = null; resolve(); }
                    return;
                }
                
                counter--;
                let mins = Math.floor(counter / 60);
                let secs = counter % 60;
                document.getElementById('timer').innerText = `${mins}:${secs.toString().padStart(2, '0')}`;

                if (type === 'run' && counter > 0 && counter % 60 === 0) {
                    speak(`Noch ${counter / 60} Minuten laufen.`);
                }

                if (counter <= 30 && counter > 5 && counter % 5 === 0) {
                    beep(440, 100);
                }
                if (counter <= 5 && counter > 0) {
                    beep(880, 100);
                }

                if (counter <= 0) {
                    clearInterval(timerInterval);
                    if (timerResolve) { timerResolve = null; resolve(); }
                }
            }, 1000);
        });
    }

    async function startWorkout(id) {
        // Audio-Kontext direkt beim Klick starten
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const summerMusic = document.getElementById('music-summer');
        const powerMusic = document.getElementById('music-power');
        
        summerMusic.volume = 0;
        powerMusic.volume = 0;
        
        summerMusic.play().catch(e => console.log("Audio-Aktivierung Fehlgeschlagen:", e));
        powerMusic.play().catch(e => console.log("Audio-Aktivierung Fehlgeschlagen:", e));

        workoutActive = true;
        currentStepIndex = 0;
        steps = workouts[id];
        
        document.getElementById('menu').style.display = 'none';
        document.getElementById('nav-controls').style.display = 'flex';
        document.getElementById('stop-btn').style.display = 'block';
        
        while (workoutActive && currentStepIndex < steps.length) {
            skipHappened = false;
            let step = steps[currentStepIndex];
            
            updateUI(step.type, "Höre auf die Anweisung...");
            await speak(step.text);
            
            if (!skipHappened && workoutActive) {
                updateUI(step.type, step.text);
                await startTimer(step.duration, step.type);
            }
            
            if (!skipHappened && workoutActive) {
                currentStepIndex++;
            }
        }
        
        if (workoutActive) {
            updateUI('run', "Gute Arbeit!");
            await speak("Herzlichen Glückwunsch! Du hast das gesamte Workout erfolgreich beendet.");
            stopWorkout();
        }
    }

    function triggerSkip(direction) {
        if (!workoutActive) return;
        skipHappened = true;
        
        clearInterval(timerInterval);
        synth.cancel();
        
        if (direction === 'next') {
            if (currentStepIndex < steps.length - 1) {
                currentStepIndex++;
            } else {
                currentStepIndex = steps.length;
            }
        } else if (direction === 'prev') {
            currentStepIndex = Math.max(0, currentStepIndex - 1);
        }
        
        if (timerResolve) { let res = timerResolve; timerResolve = null; res(); }
        if (speakResolve) { let res = speakResolve; speakResolve = null; res(); }
    }

    function stopWorkout() {
        workoutActive = false;
        clearInterval(timerInterval);
        synth.cancel();
        
        const summerMusic = document.getElementById('music-summer');
        const powerMusic = document.getElementById('music-power');
        
        summerMusic.pause();
        powerMusic.pause();
        summerMusic.currentTime = 0;
        powerMusic.currentTime = 0;
        
        document.getElementById('menu').style.display = 'block';
        document.getElementById('nav-controls
